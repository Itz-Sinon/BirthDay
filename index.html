<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chúc Mừng Sinh Nhật!</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="wish-wrapper">
        <div id="wish-box">
          <div class="corner-meme top-left" id="corner-tl"></div>
          <div class="corner-meme top-right" id="corner-tr"></div>
          <div class="corner-meme bottom-left" id="corner-bl"></div>
          <div class="corner-meme bottom-right" id="corner-br"></div>
          <h1 id="title">Happy Birthday! 🎂</h1>
          <p id="wish-text">Bấm vào màn hình để nhận lời chúc nhé...</p>
          <p id="wish-signature" style="display: none">- From Sinon -</p>
        </div>
      </div>

      <!-- Khu vực hiển thị 1 ảnh Meme lớn phía dưới -->
      <div id="main-meme-container" class="meme-card" style="display: none">
        <img id="main-meme-img" src="" alt="Meme" />
        <div id="main-meme-caption" class="meme-caption"></div>
      </div>

      <!-- Màn hình cuối cùng hiện sau khi hết tất cả lời chúc -->
      <div id="final-screen" style="display: none">
        <div class="final-container-layout">
          <!-- Cột bên trái: 3 ảnh -->
          <div id="left-meme-col" class="meme-col"></div>

          <!-- Hộp lời chúc ở giữa -->
          <div id="final-wish-box" class="wish-box-final">
            <h1 id="title">Happy Birthday! 💖</h1>
            <p id="wish-text">
              Mong bạn luôn rạng rỡ và hạnh phúc như những tấm ảnh kỷ niệm này
              nhé!
            </p>
          </div>

          <!-- Cột bên phải: 3 ảnh -->
          <div id="right-meme-col" class="meme-col"></div>
        </div>

        <button id="restart-btn">Quay lại từ đầu 🔄</button>
      </div>
    </div>

    <div class="hint">Chạm tay vào màn hình ❤️</div>

    <script>
      // Danh sách ảnh của nhân vật chính (Ảnh này sẽ hiện ở ổ chính phía dưới)
      const heroImages = [
        { src: "./public/hero/main-1.png", caption: "Ngôi sao hôm nay! ✨" },
        {
          src: "./public/hero/main-2.png",
          caption: "Xinh đẹp/Đẹp trai quá! 😍",
        },
        {
          src: "./public/hero/main-3.png",
          caption: "Cười tươi như hoa nhé! 🌸",
        },
      ];

      // Danh sách ảnh meme (Ảnh này sẽ hiện ngẫu nhiên ở 2 góc card lời chúc)
      const memes = [
        { src: "./public/memes/gift-1.png" },
        { src: "./public/memes/gift-2.png" },
        { src: "./public/memes/gift-3.png" },
        { src: "./public/memes/gift-6.png" },
        { src: "./public/memes/gift-7.png" },
        { src: "./public/memes/gift-9.png" },
        { src: "./public/memes/gift-10.png" },
        { src: "./public/memes/gift-12.png" },
      ];

      // Danh sách các lời chúc
      const wishes = [
        "Chúc bạn tuổi mới thật rực rỡ và hạnh phúc! ✨",
        "Mỗi ngày mới đều là một món quà, tuổi mới hãy luôn cười nhé! 😊",
        "Chúc bạn đạt được mọi dự định trong năm nay! 🚀",
        "Luôn xinh đẹp, tự tin và yêu đời như hiện tại nha! 🌸",
        "Vạn sự như ý, tỷ sự như mơ, làm việc như thơ! 💰",
        "Chúc bạn nhận được thật nhiều quà và tình yêu thương! 🎁",
      ];

      let currentWishIndex = -1;
      const wishText = document.getElementById("wish-text");
      const wishBox = document.getElementById("wish-box");
      const mainMemeContainer = document.getElementById("main-meme-container");
      const mainMemeImg = document.getElementById("main-meme-img");
      const mainMemeCaption = document.getElementById("main-meme-caption");

      const cornerTL = document.getElementById("corner-tl");
      const cornerTR = document.getElementById("corner-tr");
      const cornerBL = document.getElementById("corner-bl");
      const cornerBR = document.getElementById("corner-br");

      const finalScreen = document.getElementById("final-screen");
      const fullMemeGallery = document.getElementById("full-meme-gallery");
      const wishWrapper = document.querySelector(".wish-wrapper");
      const restartBtn = document.getElementById("restart-btn");
      const wishSignature = document.getElementById("wish-signature");

      // Hàm lấy ảnh ngẫu nhiên không trùng nhau (nếu có thể)
      function getRandomMemes(count) {
        let shuffled = [...memes].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
      }

      // Hàm đổi lời chúc và ảnh
      function changeWish() {
        if (currentWishIndex >= wishes.length - 1) {
          showFinalScreen();
          return;
        }

        currentWishIndex++;

        // Hiệu ứng đổi chữ
        wishText.classList.remove("fade");
        void wishText.offsetWidth; // Trigger reflow
        wishText.classList.add("fade");

        wishText.innerText = wishes[currentWishIndex];

        // Hiện ký tên
        wishSignature.style.display = "block";

        // 1. Phía dưới: Ảnh nhân vật chính (Không ngẫu nhiên - đi theo lời chúc)
        const currentHero = heroImages[currentWishIndex % heroImages.length];
        mainMemeContainer.style.display = "flex";
        mainMemeImg.src = currentHero.src;
        mainMemeCaption.innerText = currentHero.caption;

        // 2. Góc Card: Lấy 2 ảnh meme ngẫu nhiên
        const selectedMemes = getRandomMemes(2);

        // Làm sạch hết góc cũ
        cornerTL.innerHTML = "";
        cornerTR.innerHTML = "";
        cornerBL.innerHTML = "";
        cornerBR.innerHTML = "";

        // Hiện 2 ảnh nhỏ ở các góc xen kẽ nhau
        if (currentWishIndex % 2 === 0) {
          // Lần chẵn (Câu 1, 3, 5...): Top-Right và Bottom-Left
          cornerTR.innerHTML = `<img src="${selectedMemes[0].src}" class="mini-meme" />`;
          cornerBL.innerHTML = `<img src="${selectedMemes[1].src}" class="mini-meme" />`;
        } else {
          // Lần lẻ (Câu 2, 4, 6...): Top-Left và Bottom-Right
          cornerTL.innerHTML = `<img src="${selectedMemes[0].src}" class="mini-meme" />`;
          cornerBR.innerHTML = `<img src="${selectedMemes[1].src}" class="mini-meme" />`;
        }

        // Tạo pháo hoa giấy khi bấm
        createConfetti();
      }

      const leftMemeCol = document.getElementById("left-meme-col");
      const rightMemeCol = document.getElementById("right-meme-col");

      function showFinalScreen() {
        // Ẩn các thứ bình thường
        wishWrapper.style.display = "none";
        mainMemeContainer.style.display = "none";
        document.querySelector(".hint").style.display = "none";

        // Hiện màn hình cuối
        finalScreen.style.display = "flex";

        // Làm sạch cột
        leftMemeCol.innerHTML = "";
        rightMemeCol.innerHTML = "";

        // Đổ tối đa 6 ảnh vào 2 bên
        memes.slice(0, 6).forEach((meme, index) => {
          const card = document.createElement("div");
          card.className = "meme-card";

          // Tạo độ nghiêng tầm 15 độ (đan xen âm dương)
          const angle = index % 2 === 0 ? 15 : -15;
          card.style.transform = `rotate(${angle}deg)`;
          card.style.animation = `slideUp 0.6s ease ${index * 0.15}s both`;

          card.innerHTML = `
            <img src="${meme.src}" alt="${meme.caption}" />
            <div class="meme-caption">${meme.caption}</div>
          `;

          if (index < 3) {
            leftMemeCol.appendChild(card);
          } else {
            rightMemeCol.appendChild(card);
          }
        });

        // Tung pháo hoa
        for (let i = 0; i < 3; i++) {
          setTimeout(createConfetti, i * 500);
        }
      }

      // Khởi tạo lần đầu
      // changeWish(); // Nếu bạn muốn hiện ngay khi vừa mở trang thì bỏ comment dòng này

      // Nút quay lại từ đầu
      restartBtn.addEventListener("click", (e) => {
        e.stopPropagation(); // Không kích hoạt click body
        currentWishIndex = -1;

        // Hiện lại giao diện ban đầu
        wishWrapper.style.display = "block";
        mainMemeContainer.style.display = "none";
        document.querySelector(".hint").style.display = "block";
        finalScreen.style.display = "none";

        // Reset text và làm sạch góc
        wishText.innerText = "Bấm vào màn hình để nhận lời chúc nhé...";
        wishSignature.style.display = "none";
        cornerTL.innerHTML = "";
        cornerTR.innerHTML = "";
        cornerBL.innerHTML = "";
        cornerBR.innerHTML = "";
      });

      // Lắng nghe sự kiện click/tap trên toàn màn hình
      document.body.addEventListener("click", (e) => {
        // Nếu nhấn trúng thẻ ảnh, nút bấm hoặc thẻ corner thì không đổi lời chúc
        if (
          e.target.closest(".meme-card") ||
          e.target.closest(".corner-meme") ||
          e.target.id === "restart-btn"
        )
          return;
        changeWish();
      });

      // Hàm tạo pháo hoa giấy (Confetti) đơn giản
      function createConfetti() {
        for (let i = 0; i < 30; i++) {
          const confetti = document.createElement("div");
          confetti.classList.add("confetti");
          confetti.style.left = Math.random() * 100 + "vw";
          confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
          confetti.style.top = "-10px";
          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

          document.body.appendChild(confetti);

          const animation = confetti.animate(
            [
              { transform: `translate3d(0, 0, 0) rotate(0deg)`, opacity: 1 },
              {
                transform: `translate3d(${(Math.random() - 0.5) * 200}px, 100vh, 0) rotate(${Math.random() * 360}deg)`,
                opacity: 0,
              },
            ],
            {
              duration: Math.random() * 2000 + 1000,
              easing: "cubic-bezier(0, .9, .57, 1)",
            },
          );

          animation.onfinish = () => confetti.remove();
        }
      }
    </script>
  </body>
</html>
