<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chúc Mừng Sinh Nhật!</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="wish-wrapper">
        <div id="wish-box">
          <div class="corner-meme top-left" id="corner-tl"></div>
          <div class="corner-meme top-right" id="corner-tr"></div>
          <div class="corner-meme bottom-left" id="corner-bl"></div>
          <div class="corner-meme bottom-right" id="corner-br"></div>
          <h1 id="title">Happy Birthday! 🎂</h1>
          <p id="wish-text">Bấm vào màn hình để nhận lời chúc nhé...</p>
        </div>
      </div>

      <!-- Khu vực hiển thị 1 ảnh Meme lớn phía dưới -->
      <div id="main-meme-container" class="meme-card" style="display: none">
        <img id="main-meme-img" src="" alt="Meme" />
        <div id="main-meme-caption" class="meme-caption"></div>
      </div>

      <!-- Màn hình cuối cùng hiện sau khi hết tất cả lời chúc -->
      <div id="final-screen" style="display: none">
        <div id="final-wish-box" class="wish-box-final">
          <h1 id="title">Happy Birthday! 💖</h1>
          <p id="wish-text">Mong bạn luôn rạng rỡ và hạnh phúc như những tấm ảnh kỷ niệm này nhé!</p>
        </div>
        <div id="full-meme-gallery" class="meme-gallery-full">
          <!-- Ảnh sẽ được JS tự động điền vào đây -->
        </div>
      </div>
    </div>

    <div class="hint">Chạm tay vào màn hình ❤️</div>

    <script>
      // Danh sách ảnh meme
      const memes = [
        { src: "meme1.jpg", caption: "Siêu quậy!" },
        { src: "meme2.jpg", caption: "Khoảnh khắc khó đỡ" },
        { src: "meme3.jpg", caption: "Cười xỉu" },
        { src: "meme4.jpg", caption: "Birthday Vibes" },
        { src: "meme5.jpg", caption: "Hết nước chấm" },
        { src: "meme6.jpg", caption: "Quá là sướng" },
      ];

      // Danh sách các lời chúc
      const wishes = [
        "Chúc bạn tuổi mới thật rực rỡ và hạnh phúc! ✨",
        "Mỗi ngày mới đều là một món quà, tuổi mới hãy luôn cười nhé! 😊",
        "Chúc bạn đạt được mọi dự định trong năm nay! 🚀",
        "Luôn xinh đẹp, tự tin và yêu đời như hiện tại nha! 🌸",
        "Vạn sự như ý, tỷ sự như mơ, làm việc như thơ! 💰",
        "Chúc bạn nhận được thật nhiều quà và tình yêu thương! 🎁",
        "Sức khỏe dồi dào, tiền vào như nước, tiền ra nhỏ giọt! 🧧",
        "Happy Birthday! Mong mọi điều tốt đẹp nhất sẽ đến với bạn! ❤️",
      ];

      let currentWishIndex = -1;
      const wishText = document.getElementById("wish-text");
      const wishBox = document.getElementById("wish-box");
      const mainMemeContainer = document.getElementById("main-meme-container");
      const mainMemeImg = document.getElementById("main-meme-img");
      const mainMemeCaption = document.getElementById("main-meme-caption");
      
      const cornerTL = document.getElementById("corner-tl");
      const cornerTR = document.getElementById("corner-tr");
      const cornerBL = document.getElementById("corner-bl");
      const cornerBR = document.getElementById("corner-br");
      
      const finalScreen = document.getElementById("final-screen");
      const fullMemeGallery = document.getElementById("full-meme-gallery");
      const wishWrapper = document.querySelector(".wish-wrapper");

      // Hàm lấy ảnh ngẫu nhiên không trùng nhau (nếu có thể)
      function getRandomMemes(count) {
        let shuffled = [...memes].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
      }

      // Hàm đổi lời chúc và ảnh
      function changeWish() {
        if (currentWishIndex >= wishes.length - 1) {
          showFinalScreen();
          return;
        }

        currentWishIndex++;

        // Hiệu ứng đổi chữ
        wishText.classList.remove("fade");
        void wishText.offsetWidth; // Trigger reflow
        wishText.classList.add("fade");

        wishText.innerText = wishes[currentWishIndex];

        // Đổi ảnh meme
        const selectedMemes = getRandomMemes(3);
        
        // Hiện ảnh chính phía dưới
        mainMemeContainer.style.display = "flex";
        mainMemeImg.src = selectedMemes[0].src;
        mainMemeCaption.innerText = selectedMemes[0].caption;

        // Làm sạch hết góc cũ
        cornerTL.innerHTML = "";
        cornerTR.innerHTML = "";
        cornerBL.innerHTML = "";
        cornerBR.innerHTML = "";

        // Hiện 2 ảnh nhỏ ở các góc xen kẽ nhau
        if (currentWishIndex % 2 === 0) {
          // Lần chẵn (Câu 1, 3, 5...): Top-Right và Bottom-Left
          cornerTR.innerHTML = `<img src="${selectedMemes[1].src}" class="mini-meme" />`;
          cornerBL.innerHTML = `<img src="${selectedMemes[2].src}" class="mini-meme" />`;
        } else {
          // Lần lẻ (Câu 2, 4, 6...): Top-Left và Bottom-Right
          cornerTL.innerHTML = `<img src="${selectedMemes[1].src}" class="mini-meme" />`;
          cornerBR.innerHTML = `<img src="${selectedMemes[2].src}" class="mini-meme" />`;
        }

        // Tạo pháo hoa giấy khi bấm
        createConfetti();
      }

      function showFinalScreen() {
        // Ẩn các thứ bình thường
        wishWrapper.style.display = "none";
        mainMemeContainer.style.display = "none";
        document.querySelector(".hint").style.display = "none";

        // Hiện màn hình cuối
        finalScreen.style.display = "flex";

        // Đổ toàn bộ ảnh vào gallery cuối
        fullMemeGallery.innerHTML = "";
        memes.forEach((meme, index) => {
          const rotation = (Math.random() - 0.5) * 20; // Xoay ngẫu nhiên cho đẹp
          const card = document.createElement("div");
          card.className = "meme-card";
          card.style.transform = `rotate(${rotation}deg)`;
          card.style.animation = `slideUp 0.6s ease ${index * 0.1}s both`;
          card.innerHTML = `
            <img src="${meme.src}" alt="${meme.caption}" />
            <div class="meme-caption">${meme.caption}</div>
          `;
          fullMemeGallery.appendChild(card);
        });

        // Tung thật nhiều pháo hoa
        for (let i = 0; i < 3; i++) {
          setTimeout(createConfetti, i * 500);
        }
      }

      // Khởi tạo lần đầu
      // changeWish(); // Nếu bạn muốn hiện ngay khi vừa mở trang thì bỏ comment dòng này

      // Lắng nghe sự kiện click/tap trên toàn màn hình
      document.body.addEventListener("click", (e) => {
        // Nếu nhấn trúng thẻ ảnh hoặc nằm trong thẻ ảnh thì không đổi lời chúc
        if (e.target.closest(".meme-card") || e.target.closest(".corner-meme")) return;
        changeWish();
      });

      // Hàm tạo pháo hoa giấy (Confetti) đơn giản
      function createConfetti() {
        for (let i = 0; i < 30; i++) {
          const confetti = document.createElement("div");
          confetti.classList.add("confetti");
          confetti.style.left = Math.random() * 100 + "vw";
          confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
          confetti.style.top = "-10px";
          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;

          document.body.appendChild(confetti);

          const animation = confetti.animate(
            [
              { transform: `translate3d(0, 0, 0) rotate(0deg)`, opacity: 1 },
              {
                transform: `translate3d(${(Math.random() - 0.5) * 200}px, 100vh, 0) rotate(${Math.random() * 360}deg)`,
                opacity: 0,
              },
            ],
            {
              duration: Math.random() * 2000 + 1000,
              easing: "cubic-bezier(0, .9, .57, 1)",
            },
          );

          animation.onfinish = () => confetti.remove();
        }
      }
    </script>
  </body>
</html>
